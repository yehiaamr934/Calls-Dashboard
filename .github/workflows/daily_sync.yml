name: Daily Sheet Sync

on:
  schedule:
    - cron: "0 6 * * *"  # 8 AM Cairo time (UTC+2)
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth pandas

      - name: Run data fetch
        env:
          GSHEET_KEY: ${{ secrets.GSHEET_KEY }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly_summary.json
          git diff --staged --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
