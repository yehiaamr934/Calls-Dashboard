<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pactful - Calls Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #8b8d97;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .header h1 span { color: var(--accent-light); }

    .updated {
      font-size: 13px;
      color: var(--muted);
    }

    .week-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .week-selector label {
      font-size: 14px;
      color: var(--muted);
    }

    .week-selector select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    .week-selector select:focus { border-color: var(--accent); }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .kpi .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .kpi .value {
      font-size: 28px;
      font-weight: 700;
    }

    .kpi .delta {
      font-size: 12px;
      margin-top: 4px;
    }

    .delta.up { color: var(--green); }
    .delta.down { color: var(--red); }
    .delta.neutral { color: var(--muted); }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-card h3 {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .chart-card canvas { max-height: 280px; }

    .full-width { grid-column: 1 / -1; }

    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .table-card h3 {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    td { color: var(--text); }

    .bar {
      height: 8px;
      border-radius: 4px;
      background: var(--accent);
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
      transition: width 0.3s;
    }

    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      body { padding: 16px; }
    }

    @media (max-width: 480px) {
      .kpi-row { grid-template-columns: 1fr; }
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Pactful</span> Calls Dashboard</h1>
    <div class="updated" id="updated"></div>
  </div>

  <div class="week-selector">
    <label for="weekPicker">Week:</label>
    <select id="weekPicker"></select>
  </div>

  <div class="kpi-row" id="kpis"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Leads per Week</h3>
      <canvas id="leadsChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Salary Pool per Week (EGP)</h3>
      <canvas id="salaryChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Roles Breakdown (Selected Week)</h3>
      <canvas id="rolesChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Top Locations (Selected Week)</h3>
      <canvas id="locationsChart"></canvas>
    </div>
  </div>

  <div class="table-card">
    <h3>All Roles — Selected Week</h3>
    <table>
      <thead><tr><th>Role</th><th>Count</th><th></th></tr></thead>
      <tbody id="rolesTable"></tbody>
    </table>
  </div>

  <script>
    const COLORS = [
      '#6366f1','#818cf8','#a5b4fc','#22c55e','#f59e0b',
      '#ef4444','#ec4899','#14b8a6','#f97316','#8b5cf6'
    ];

    let data = null;
    let leadsChart, salaryChart, rolesChart, locationsChart;

    async function init() {
      const res = await fetch('data/weekly_summary.json');
      data = await res.json();

      document.getElementById('updated').textContent =
        'Last updated: ' + new Date(data.updated_at).toLocaleString();

      const weeks = Object.keys(data.weeks).map(Number).sort((a, b) => a - b);
      const picker = document.getElementById('weekPicker');
      weeks.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w;
        opt.textContent = `Week ${w}`;
        picker.appendChild(opt);
      });
      picker.value = weeks[weeks.length - 1];
      picker.addEventListener('change', () => renderWeek(Number(picker.value)));

      renderTrendCharts(weeks);
      renderWeek(weeks[weeks.length - 1]);
    }

    function renderTrendCharts(weeks) {
      const labels = weeks.map(w => `W${w}`);
      const counts = weeks.map(w => data.weeks[w].count);
      const pools = weeks.map(w => data.weeks[w].salary_pool);

      const gridColor = 'rgba(255,255,255,0.06)';
      const tickColor = '#8b8d97';

      leadsChart = new Chart(document.getElementById('leadsChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: counts,
            backgroundColor: '#6366f1',
            borderRadius: 6,
            maxBarThickness: 40,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: tickColor } },
            y: { grid: { color: gridColor }, ticks: { color: tickColor } }
          }
        }
      });

      salaryChart = new Chart(document.getElementById('salaryChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: pools,
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34,197,94,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointBackgroundColor: '#22c55e',
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: tickColor } },
            y: {
              grid: { color: gridColor },
              ticks: {
                color: tickColor,
                callback: v => (v / 1000) + 'k'
              }
            }
          }
        }
      });
    }

    function renderWeek(week) {
      const w = data.weeks[week];
      const weeks = Object.keys(data.weeks).map(Number).sort((a, b) => a - b);
      const idx = weeks.indexOf(week);
      const prev = idx > 0 ? data.weeks[weeks[idx - 1]] : null;

      // KPIs
      const kpis = [
        { label: 'Total Leads', value: w.count, prev: prev?.count },
        { label: 'Avg Salary', value: w.salary_avg, prev: prev?.salary_avg, fmt: 'egp' },
        { label: 'Salary Pool', value: w.salary_pool, prev: prev?.salary_pool, fmt: 'egp' },
        { label: 'Salary Range', value: `${fmt(w.salary_min)} - ${fmt(w.salary_max)}` },
      ];

      document.getElementById('kpis').innerHTML = kpis.map(k => {
        const val = typeof k.value === 'string' ? k.value :
          k.fmt === 'egp' ? fmt(k.value) : k.value;
        let delta = '';
        if (k.prev != null && typeof k.value === 'number') {
          const diff = k.value - k.prev;
          const pct = k.prev ? Math.round((diff / k.prev) * 100) : 0;
          const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
          const arrow = diff > 0 ? '&uarr;' : diff < 0 ? '&darr;' : '';
          delta = `<div class="delta ${cls}">${arrow} ${Math.abs(pct)}% vs prev week</div>`;
        }
        return `<div class="kpi"><div class="label">${k.label}</div><div class="value">${val}</div>${delta}</div>`;
      }).join('');

      // Roles doughnut
      const roleLabels = Object.keys(w.roles);
      const roleValues = Object.values(w.roles);
      if (rolesChart) rolesChart.destroy();
      rolesChart = new Chart(document.getElementById('rolesChart'), {
        type: 'doughnut',
        data: {
          labels: roleLabels,
          datasets: [{ data: roleValues, backgroundColor: COLORS.slice(0, roleLabels.length), borderWidth: 0 }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'right', labels: { color: '#e4e4e7', boxWidth: 12, padding: 10, font: { size: 12 } } }
          }
        }
      });

      // Locations bar
      const locLabels = Object.keys(w.top_locations);
      const locValues = Object.values(w.top_locations);
      if (locationsChart) locationsChart.destroy();
      locationsChart = new Chart(document.getElementById('locationsChart'), {
        type: 'bar',
        data: {
          labels: locLabels,
          datasets: [{
            data: locValues,
            backgroundColor: '#f59e0b',
            borderRadius: 6,
            maxBarThickness: 40,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#8b8d97' } },
            y: { grid: { display: false }, ticks: { color: '#8b8d97' } }
          }
        }
      });

      // Roles table
      const maxCount = Math.max(...roleValues);
      document.getElementById('rolesTable').innerHTML = roleLabels.map((r, i) => {
        const pct = (roleValues[i] / maxCount) * 100;
        return `<tr><td>${r}</td><td>${roleValues[i]}<span class="bar" style="width:${pct}px"></span></td><td></td></tr>`;
      }).join('');
    }

    function fmt(n) {
      return n == null ? '—' : n.toLocaleString('en-EG') + ' EGP';
    }

    init();
  </script>
</body>
</html>
